<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Správa menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #111317;
      margin: 0;
      padding: 2rem 1.5rem;
      color: #c9cdd4;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      max-width: 400px;
      margin: 6rem auto;
      background: #1a1d23;
      border: 1px solid #2a2d35;
      border-radius: 12px;
      padding: 2.25rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #login-screen h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 .4rem;
      color: #f1f3f6;
    }
    #login-screen p {
      font-size: .83rem;
      color: #7a8190;
      margin: 0 0 1.75rem;
      line-height: 1.6;
    }
    #login-screen a { color: #4f8ef7; text-decoration: none; }
    #login-screen a:hover { text-decoration: underline; }

    .field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .field label { font-size: .75rem; font-weight: 600; color: #7a8190; }
    .field input {
      padding: .65rem .85rem;
      border: 1px solid #2a2d35;
      border-radius: 7px;
      background: #111317;
      color: #f1f3f6;
      font-size: .9rem;
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input::placeholder { color: #3d4250; }
    .field input:focus {
      outline: none;
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,.12);
    }

    .error-msg {
      font-size: .8rem;
      color: #f47070;
      margin: -.5rem 0 .75rem;
      display: none;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      padding: .6rem 1.25rem;
      border: 1px solid transparent;
      border-radius: 7px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-primary  { background: #4f8ef7; color: #fff; border-color: #4f8ef7; }
    .btn-primary:hover:not(:disabled)  { background: #3b7ef5; border-color: #3b7ef5; box-shadow: 0 0 0 3px rgba(79,142,247,.18); }
    .btn-ghost    { background: transparent; color: #9aa0ad; border-color: #2a2d35; }
    .btn-ghost:hover:not(:disabled)    { color: #f1f3f6; border-color: #4a4f5e; background: #1f2229; }
    .btn-full { width: 100%; }

    /* ── App layout ── */
    #app { max-width: 960px; margin: 0 auto; display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #1f2229;
      gap: 1rem;
    }
    .topbar h1 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      color: #f1f3f6;
    }

    /* ── Cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .85rem;
    }

    .card {
      background: #1a1d23;
      border: 1px solid #2a2d35;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .15s, box-shadow .15s;
    }
    .card:hover {
      border-color: #3a3f50;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }

    .card-thumb {
      aspect-ratio: 16/9;
      background: #0d0f14;
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .55rem;
      flex: 1;
    }
    .card-label {
      font-size: .875rem;
      font-weight: 600;
      color: #e8eaf0;
      line-height: 1.35;
    }
    .card-schedule {
      font-size: .73rem;
      font-weight: 600;
      color: #4f8ef7;
      background: rgba(79,142,247,.1);
      border: 1px solid rgba(79,142,247,.2);
      border-radius: 5px;
      padding: .18rem .55rem;
      display: inline-block;
      width: fit-content;
    }
    .card-filename {
      font-size: .7rem;
      color: #4a4f5e;
      font-family: monospace;
      margin-top: auto;
      padding-top: .25rem;
    }

    .card.inactive {
      opacity: .45;
    }
    .card.inactive .card-schedule-none {
      font-size: .73rem;
      font-weight: 600;
      color: #4a4f5e;
      background: #1f2229;
      border: 1px solid #2a2d35;
      border-radius: 5px;
      padding: .18rem .55rem;
      display: inline-block;
      width: fit-content;
    }

    /* progress bar */
    .progress-wrap {
      height: 3px;
      background: #1f2229;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #4f8ef7;
      width: 0;
      transition: width .2s;
    }

    /* file input overlay */
    .upload-wrap { position: relative; }
    .upload-wrap input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      padding: .8rem 1.2rem;
      border-radius: 9px;
      font-size: .83rem;
      font-weight: 500;
      color: #f1f3f6;
      opacity: 0;
      transform: translateY(.6rem);
      transition: opacity .22s, transform .22s;
      pointer-events: none;
      z-index: 9999;
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { background: #1a1d23; border: 1px solid #2a2d35; border-top: 2px solid #4f8ef7; }
    #toast.err { background: #1a1d23; border: 1px solid #2a2d35; border-top: 2px solid #f47070; }

    #status-bar {
      font-size: .78rem;
      color: #4a4f5e;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <h1>Správa menu obrazovky Vnitroblock bar</h1>
  <p>Zadej Personal Access Token (PAT) s oprávněním <code>repo</code>.</p>
  <div class="field">
    <label for="pat-input">Personal Access Token</label>
    <input id="pat-input" type="password" placeholder="ghp_..." autocomplete="off" spellcheck="false" />
  </div>
  <p id="login-error" class="error-msg"></p>
  <button class="btn btn-primary btn-full" id="login-btn">Přihlásit se</button>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <div class="topbar">
    <h1>Správa menu obrazovky Vnitroblock bar</h1>
    <button class="btn btn-ghost" id="logout-btn">Odhlásit</button>
  </div>
  <p id="status-bar"></p>
  <div id="grid" class="grid"></div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  Konfigurace repozitáře
// ─────────────────────────────────────────────
const REPO_OWNER  = "danielsnobl";
const REPO_NAME   = "signage-Vprod";
const REPO_BRANCH = "main";
const ASSETS_PATH = "assets";

// ─────────────────────────────────────────────
//  Mapování názvů souborů → lidské popisky
// ─────────────────────────────────────────────
const LABELS = {
  "snidane.jpg":                          "Snídaňové menu (všední dny)",
  "snidane_vikend.jpg":                   "Snídaňové menu (víkend)",
  "obed_tydne.jpg":                       "Obědové menu týden",
  "vecere.jpg":                           "Večerní menu",
  "napoje_a_oteviraci_doba_kuchyne.jpg":  "Nápojový lístek + otevírací doba kuchyně",
  "Ranni Menu Bez Jidla (1).jpg":         "NEAKTIVNÍ",
  "Oteviraci Doba Kuchyne.jpg":           "NEAKTIVNI",
  "vypln_pred_otevrenim.jpg":             "Výplň — před otevřením (8–9 h)",
  "vypln_mezi_snidani_a_obedem.jpg":      "Výplň — mezi snídaní a obědem (11–11:30 h)",
  "vypln_mezi_obedem_a_veceri.jpg":       "Výplň — mezi obědem a večeří (15–16 h)",
  "vypln_po_zavreni.jpg":                 "Výplň — po zavření (22–23 h)",
};

// ─────────────────────────────────────────────
//  Časové sloty z playlistu (index.html)
//  weekday = Po–Pá, weekend = So–Ne
// ─────────────────────────────────────────────
const SCHEDULE_TIMES = {
  "vypln_pred_otevrenim.jpg":             { weekday: "08:00–09:00", weekend: "08:00–09:00" },
  "snidane.jpg":                          { weekday: "09:00–11:00", weekend: null           },
  "snidane_vikend.jpg":                   { weekday: null,          weekend: "09:00–15:00"  },
  "vypln_mezi_snidani_a_obedem.jpg":      { weekday: "11:00–11:30", weekend: null           },
  "obed_tydne.jpg":                       { weekday: "11:30–15:00", weekend: null           },
  "vypln_mezi_obedem_a_veceri.jpg":       { weekday: "15:00–16:00", weekend: "15:00–16:00" },
  "vecere.jpg":                           { weekday: "16:00–21:00", weekend: "16:00–21:00" },
  "napoje_a_oteviraci_doba_kuchyne.jpg":  { weekday: "21:00–22:00", weekend: "21:00–22:00" },
  "vypln_po_zavreni.jpg":                 { weekday: "22:00–23:00", weekend: "22:00–23:00" },
};

// Pořadí karet dle playlistu (ostatní jdou na konec jako šedé)
const PLAYLIST_ORDER = Object.keys(SCHEDULE_TIMES);

function formatSchedule(filename) {
  const s = SCHEDULE_TIMES[filename];
  if (!s) return null;
  if (s.weekday && s.weekend) {
    if (s.weekday === s.weekend) return `Po\u2013Ne \u00b7 ${s.weekday}`;
    return `Po\u2013P\u00e1 \u00b7 ${s.weekday}\u2002|\u2002So\u2013Ne \u00b7 ${s.weekend}`;
  }
  if (s.weekday) return `Po\u2013P\u00e1 \u00b7 ${s.weekday}`;
  if (s.weekend) return `So\u2013Ne \u00b7 ${s.weekend}`;
  return null;
}

const TOKEN_KEY = "menu_github_pat";
const MAX_BYTES = 5 * 1024 * 1024; // 5 MB

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);

function toast(msg, type = "ok") {
  const el = $("#toast");
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3500);
}

function setStatus(msg) {
  $("#status-bar").textContent = msg;
}

function getToken() {
  return localStorage.getItem(TOKEN_KEY) || "";
}

function apiHeaders(token) {
  return {
    Authorization: `Bearer ${token}`,
    Accept: "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28",
  };
}

// ─────────────────────────────────────────────
//  Auth
// ─────────────────────────────────────────────
async function verifyToken(token) {
  const res = await fetch("https://api.github.com/user", {
    headers: apiHeaders(token),
  });
  return res.ok;
}

async function doLogin() {
  const token = $("#pat-input").value.trim();
  const errEl = $("#login-error");
  const btn   = $("#login-btn");

  errEl.style.display = "none";
  if (!token) {
    errEl.textContent = "Zadej Personal Access Token.";
    errEl.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Ověřuji token…";

  const valid = await verifyToken(token).catch(() => false);
  if (!valid) {
    errEl.textContent = "Token je neplatný nebo nemá oprávnění repo. Zkus znovu.";
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Přihlásit se";
    return;
  }

  localStorage.setItem(TOKEN_KEY, token);
  showApp();
}

function doLogout() {
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
}

// ─────────────────────────────────────────────
//  App init
// ─────────────────────────────────────────────
function showApp() {
  $("#login-screen").style.display = "none";
  $("#app").style.display = "block";
  loadImages();
}

window.addEventListener("DOMContentLoaded", () => {
  if (getToken()) {
    showApp();
  }

  $("#login-btn").addEventListener("click", doLogin);
  $("#pat-input").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  $("#logout-btn").addEventListener("click", doLogout);
});

// ─────────────────────────────────────────────
//  Load images from GitHub API
// ─────────────────────────────────────────────
async function loadImages() {
  setStatus("Načítám seznam obrázků…");
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${ASSETS_PATH}?ref=${REPO_BRANCH}`;

  const res = await fetch(url, { headers: apiHeaders(getToken()) }).catch(() => null);
  if (!res || !res.ok) {
    setStatus("Chyba při načítání. Zkontroluj připojení nebo oprávnění tokenu.");
    return;
  }

  const items = await res.json();
  const jpgs  = items.filter((f) => /\.(jpg|jpeg)$/i.test(f.name));

  // Sort: playlist files first (in schedule order), inactive files last alphabetically
  jpgs.sort((a, b) => {
    const ai = PLAYLIST_ORDER.indexOf(a.name);
    const bi = PLAYLIST_ORDER.indexOf(b.name);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return  1;
    return a.name.localeCompare(b.name, "cs");
  });

  setStatus(`${jpgs.length} obrázků v repozitáři`);
  renderGrid(jpgs);
}

// ─────────────────────────────────────────────
//  Render grid
// ─────────────────────────────────────────────
function renderGrid(files) {
  const grid = $("#grid");
  grid.innerHTML = "";

  files.forEach((file) => {
    const label    = LABELS[file.name] || file.name;
    // download_url is a direct CDN link — fast for thumbnails
    const thumbSrc = file.download_url + "?t=" + Date.now();

    const scheduleText = formatSchedule(file.name);
    const inPlaylist   = scheduleText !== null;
    const scheduleBadge = inPlaylist
      ? `<div class="card-schedule">${scheduleText}</div>`
      : `<div class="card-schedule-none">Není v playlistu</div>`;

    const card = document.createElement("div");
    card.className = inPlaylist ? "card" : "card inactive";
    card.dataset.filename = file.name;
    card.dataset.sha      = file.sha;

    card.innerHTML = `
      <div class="card-thumb">
        <img src="${thumbSrc}" alt="${label}" loading="lazy" />
      </div>
      <div class="card-body">
        <div class="card-label">${label}</div>
        ${scheduleBadge}
        <div class="card-filename">${file.name}</div>
        <div class="progress-wrap"><div class="progress-bar"></div></div>
        <div class="upload-wrap">
          <input type="file" accept=".jpg,.jpeg,image/jpeg" aria-label="Nahrát nový obrázek pro: ${label}" />
          <button class="btn btn-primary" style="width:100%">Nahrát nový JPG</button>
        </div>
      </div>
    `;

    card.querySelector("input[type=file]").addEventListener("change", (e) => handleUpload(e, card));
    grid.appendChild(card);
  });
}

// ─────────────────────────────────────────────
//  Upload via GitHub Contents API
// ─────────────────────────────────────────────
async function handleUpload(event, card) {
  const file = event.target.files[0];
  if (!file) return;

  // Validate MIME and extension
  if (!file.type.match(/^image\/jpe?g$/i) || !/\.(jpg|jpeg)$/i.test(file.name)) {
    toast("Povoleny jsou pouze JPG soubory.", "err");
    event.target.value = "";
    return;
  }

  if (file.size > MAX_BYTES) {
    toast("Soubor je příliš velký (max 5 MB).", "err");
    event.target.value = "";
    return;
  }

  const filename    = card.dataset.filename;
  const currentSha  = card.dataset.sha;
  const progressWrap = card.querySelector(".progress-wrap");
  const progressBar  = card.querySelector(".progress-bar");
  const uploadBtn    = card.querySelector(".btn");

  uploadBtn.disabled = true;
  progressWrap.style.display = "block";
  progressBar.style.width = "20%";

  try {
    // Read file as base64
    const base64 = await fileToBase64(file);
    progressBar.style.width = "50%";

    const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${ASSETS_PATH}/${encodeURIComponent(filename)}`;

    const body = {
      message: `Aktualizace obrázku: ${filename}`,
      content: base64,
      branch:  REPO_BRANCH,
      sha:     currentSha, // required to update existing file
    };

    const res = await fetch(apiUrl, {
      method:  "PUT",
      headers: { ...apiHeaders(getToken()), "Content-Type": "application/json" },
      body:    JSON.stringify(body),
    });

    progressBar.style.width = "100%";

    if (res.ok) {
      const data = await res.json();
      // Update SHA so next upload on same card works without reload
      card.dataset.sha = data.content.sha;

      // Refresh thumbnail
      const img = card.querySelector("img");
      img.src = data.content.download_url + "?t=" + Date.now();

      toast(`✓ ${filename} byl úspěšně nahrán a commitnut.`);
    } else {
      const err = await res.json().catch(() => ({}));
      toast(`Chyba ${res.status}: ${err.message || "Neznámá chyba"}`, "err");
    }
  } catch (e) {
    toast("Síťová chyba při nahrávání.", "err");
  } finally {
    setTimeout(() => {
      progressWrap.style.display = "none";
      progressBar.style.width = "0";
    }, 700);
    uploadBtn.disabled = false;
    event.target.value = "";
  }
}

// ─────────────────────────────────────────────
//  File → base64 (without data URI prefix)
// ─────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
</script>
<div style="position:fixed;bottom:10px;left:10px;font-size:11px;color:#a1a1aa;pointer-events:none;font-family:system-ui,sans-serif;">Technické řešení: Daniel Šnobl</div>
</body>
</html>
