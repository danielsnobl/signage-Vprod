<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Správa menu</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #111317;
      margin: 0;
      padding: 2rem 1.5rem;
      color: #c9cdd4;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      max-width: 400px;
      margin: 6rem auto;
      background: #1a1d23;
      border: 1px solid #2a2d35;
      border-radius: 12px;
      padding: 2.25rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }
    #login-screen h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0 0 .4rem;
      color: #f1f3f6;
    }
    #login-screen p {
      font-size: .83rem;
      color: #7a8190;
      margin: 0 0 1.75rem;
      line-height: 1.6;
    }
    #login-screen a { color: #4f8ef7; text-decoration: none; }
    #login-screen a:hover { text-decoration: underline; }

    .field { display: flex; flex-direction: column; gap: .35rem; margin-bottom: 1rem; }
    .field label { font-size: .75rem; font-weight: 600; color: #7a8190; }
    .field input {
      padding: .65rem .85rem;
      border: 1px solid #2a2d35;
      border-radius: 7px;
      background: #111317;
      color: #f1f3f6;
      font-size: .9rem;
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input::placeholder { color: #3d4250; }
    .field input:focus {
      outline: none;
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,.12);
    }

    .error-msg {
      font-size: .8rem;
      color: #f47070;
      margin: -.5rem 0 .75rem;
      display: none;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .45rem;
      padding: .6rem 1.25rem;
      border: 1px solid transparent;
      border-radius: 7px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: .35; cursor: not-allowed; }
    .btn-primary  { background: #4f8ef7; color: #fff; border-color: #4f8ef7; }
    .btn-primary:hover:not(:disabled)  { background: #3b7ef5; border-color: #3b7ef5; box-shadow: 0 0 0 3px rgba(79,142,247,.18); }
    .btn-ghost    { background: transparent; color: #9aa0ad; border-color: #2a2d35; }
    .btn-ghost:hover:not(:disabled)    { color: #f1f3f6; border-color: #4a4f5e; background: #1f2229; }
    .btn-full { width: 100%; }

    /* ── App layout ── */
    #app { max-width: 960px; margin: 0 auto; display: none; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #1f2229;
      gap: 1rem;
    }
    .topbar h1 {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      color: #f1f3f6;
    }

    /* ── Cards grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: .85rem;
    }

    .card {
      background: #1a1d23;
      border: 1px solid #2a2d35;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .15s, box-shadow .15s;
    }
    .card:hover {
      border-color: #3a3f50;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }

    .card-thumb {
      aspect-ratio: 16/9;
      background: #0d0f14;
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .card-body {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: .55rem;
      flex: 1;
    }
    .card-label {
      font-size: .875rem;
      font-weight: 600;
      color: #e8eaf0;
      line-height: 1.35;
    }
    .card-schedule {
      font-size: .73rem;
      font-weight: 600;
      color: #4f8ef7;
      background: rgba(79,142,247,.1);
      border: 1px solid rgba(79,142,247,.2);
      border-radius: 5px;
      padding: .18rem .55rem;
      display: inline-block;
      width: fit-content;
    }
    .card-filename {
      font-size: .7rem;
      color: #4a4f5e;
      font-family: monospace;
      margin-top: auto;
      padding-top: .25rem;
    }

    .card.inactive {
      opacity: .45;
    }
    .card.inactive .card-schedule-none {
      font-size: .73rem;
      font-weight: 600;
      color: #4a4f5e;
      background: #1f2229;
      border: 1px solid #2a2d35;
      border-radius: 5px;
      padding: .18rem .55rem;
      display: inline-block;
      width: fit-content;
    }

    /* progress bar */
    .progress-wrap {
      height: 3px;
      background: #1f2229;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #4f8ef7;
      width: 0;
      transition: width .2s;
    }

    /* file input overlay */
    .upload-wrap { position: relative; }
    .upload-wrap input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.75rem;
      right: 1.75rem;
      padding: .8rem 1.2rem;
      border-radius: 9px;
      font-size: .83rem;
      font-weight: 500;
      color: #f1f3f6;
      opacity: 0;
      transform: translateY(.6rem);
      transition: opacity .22s, transform .22s;
      pointer-events: none;
      z-index: 9999;
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { background: #1a1d23; border: 1px solid #2a2d35; border-top: 2px solid #4f8ef7; }
    #toast.err { background: #1a1d23; border: 1px solid #2a2d35; border-top: 2px solid #f47070; }

    #status-bar {
      font-size: .78rem;
      color: #4a4f5e;
      margin-bottom: 1.5rem;
    }

    /* ── Promo section ── */
    .section-divider {
      border: none;
      border-top: 1px solid #1f2229;
      margin: 2.5rem 0 2rem;
    }
    .section-heading {
      font-size: .95rem;
      font-weight: 700;
      color: #f1f3f6;
      margin: 0 0 1.25rem;
    }
    .promo-panel {
      background: #1a1d23;
      border: 1px solid #2a2d35;
      border-radius: 10px;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 640px) {
      .promo-panel { grid-template-columns: 1fr; }
    }
    .promo-col { display: flex; flex-direction: column; gap: 1rem; }
    .promo-col-label {
      font-size: .75rem;
      font-weight: 700;
      color: #7a8190;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .25rem;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .form-row label {
      font-size: .75rem;
      font-weight: 600;
      color: #7a8190;
    }
    .form-row input[type=number],
    .form-row select {
      padding: .55rem .75rem;
      border: 1px solid #2a2d35;
      border-radius: 7px;
      background: #111317;
      color: #f1f3f6;
      font-size: .875rem;
      width: 100%;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-row input[type=number]:focus,
    .form-row select:focus {
      outline: none;
      border-color: #4f8ef7;
      box-shadow: 0 0 0 3px rgba(79,142,247,.12);
    }

    /* toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .toggle-row span {
      font-size: .875rem;
      font-weight: 600;
      color: #e8eaf0;
    }
    .toggle {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #2a2d35;
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle input:checked + .toggle-track { background: #4f8ef7; }
    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    /* promo thumb */
    .promo-thumb-wrap {
      aspect-ratio: 16/9;
      background: #0d0f14;
      border-radius: 7px;
      overflow: hidden;
      border: 1px solid #2a2d35;
    }
    .promo-thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .promo-thumb-wrap .promo-no-img {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .78rem;
      color: #3d4250;
    }
  </style>
</head>
<body>

<!-- ══════════════ LOGIN ══════════════ -->
<div id="login-screen">
  <h1>Správa menu obrazovky Vnitroblock bar</h1>
  <p>Zadej Personal Access Token (PAT) s oprávněním <code>repo</code>.</p>
  <div class="field">
    <label for="pat-input">Personal Access Token</label>
    <input id="pat-input" type="password" placeholder="ghp_..." autocomplete="off" spellcheck="false" />
  </div>
  <p id="login-error" class="error-msg"></p>
  <button class="btn btn-primary btn-full" id="login-btn">Přihlásit se</button>
</div>

<!-- ══════════════ APP ══════════════ -->
<div id="app">
  <div class="topbar">
    <h1>Správa menu obrazovky Vnitroblock bar</h1>
    <button class="btn btn-ghost" id="logout-btn">Odhlásit</button>
  </div>
  <p id="status-bar"></p>
  <div id="grid" class="grid"></div>

  <!-- ── Promo overlay sekce ── -->
  <hr class="section-divider" />
  <h2 class="section-heading">Promo overlay</h2>
  <div id="promo-section">
    <p style="font-size:.83rem;color:#4a4f5e;">Načítám nastavení…</p>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  Konfigurace repozitáře
// ─────────────────────────────────────────────
const REPO_OWNER  = "danielsnobl";
const REPO_NAME   = "signage-Vprod";
const REPO_BRANCH = "feature/promo-overlay";
const ASSETS_PATH = "assets";
const CONFIG_PATH = "config.json";
const INDEX_PATH  = "index.html";

// ─────────────────────────────────────────────
//  Mapování názvů souborů → lidské popisky
// ─────────────────────────────────────────────
const LABELS = {
  "snidane.jpg":                          "Snídaňové menu (všední dny)",
  "snidane_vikend.jpg":                   "Snídaňové menu (víkend)",
  "obed_tydne.jpg":                       "Obědové menu týden",
  "vecere.jpg":                           "Večerní menu",
  "napoje_a_oteviraci_doba_kuchyne.jpg":  "Nápojový lístek + otevírací doba kuchyně",
  "Ranni Menu Bez Jidla (1).jpg":         "NEAKTIVNÍ",
  "Oteviraci Doba Kuchyne.jpg":           "NEAKTIVNI",
  "vypln_pred_otevrenim.jpg":             "Výplň — před otevřením (8–9 h)",
  "vypln_mezi_snidani_a_obedem.jpg":      "Výplň — mezi snídaní a obědem (11–11:30 h)",
  "vypln_mezi_obedem_a_veceri.jpg":       "Výplň — mezi obědem a večeří (15–16 h)",
  "vypln_po_zavreni.jpg":                 "Výplň — po zavření (22–23 h)",
};

// ─────────────────────────────────────────────
//  Časové sloty z playlistu (index.html)
//  weekday = Po–Pá, weekend = So–Ne
// ─────────────────────────────────────────────
const SCHEDULE_TIMES = {
  "vypln_pred_otevrenim.jpg":             { weekday: "08:00–09:00", weekend: "08:00–09:00" },
  "snidane.jpg":                          { weekday: "09:00–11:00", weekend: null           },
  "snidane_vikend.jpg":                   { weekday: null,          weekend: "09:00–15:00"  },
  "vypln_mezi_snidani_a_obedem.jpg":      { weekday: "11:00–11:30", weekend: null           },
  "obed_tydne.jpg":                       { weekday: "11:30–15:00", weekend: null           },
  "vypln_mezi_obedem_a_veceri.jpg":       { weekday: "15:00–16:00", weekend: "15:00–16:00" },
  "vecere.jpg":                           { weekday: "16:00–21:00", weekend: "16:00–21:00" },
  "napoje_a_oteviraci_doba_kuchyne.jpg":  { weekday: "21:00–22:00", weekend: "21:00–22:00" },
  "vypln_po_zavreni.jpg":                 { weekday: "22:00–23:00", weekend: "22:00–23:00" },
};

// Pořadí karet dle playlistu (ostatní jdou na konec jako šedé)
const PLAYLIST_ORDER = Object.keys(SCHEDULE_TIMES);

function formatSchedule(filename) {
  const s = SCHEDULE_TIMES[filename];
  if (!s) return null;
  if (s.weekday && s.weekend) {
    if (s.weekday === s.weekend) return `Po\u2013Ne \u00b7 ${s.weekday}`;
    return `Po\u2013P\u00e1 \u00b7 ${s.weekday}\u2002|\u2002So\u2013Ne \u00b7 ${s.weekend}`;
  }
  if (s.weekday) return `Po\u2013P\u00e1 \u00b7 ${s.weekday}`;
  if (s.weekend) return `So\u2013Ne \u00b7 ${s.weekend}`;
  return null;
}

const TOKEN_KEY = "menu_github_pat";
const MAX_BYTES = 5 * 1024 * 1024; // 5 MB

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
const $ = (sel) => document.querySelector(sel);

function toast(msg, type = "ok") {
  const el = $("#toast");
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 3500);
}

function setStatus(msg) {
  $("#status-bar").textContent = msg;
}

function getToken() {
  return localStorage.getItem(TOKEN_KEY) || "";
}

function apiHeaders(token) {
  return {
    Authorization: `Bearer ${token}`,
    Accept: "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28",
  };
}

function generateVersion() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}w${pad(d.getMonth() + 1)}${pad(d.getDate())}${pad(d.getHours())}${pad(d.getMinutes())}`;
}

// ─────────────────────────────────────────────
//  Auth
// ─────────────────────────────────────────────
async function verifyToken(token) {
  const res = await fetch("https://api.github.com/user", {
    headers: apiHeaders(token),
  });
  return res.ok;
}

async function doLogin() {
  const token = $("#pat-input").value.trim();
  const errEl = $("#login-error");
  const btn   = $("#login-btn");

  errEl.style.display = "none";
  if (!token) {
    errEl.textContent = "Zadej Personal Access Token.";
    errEl.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Ověřuji token…";

  const valid = await verifyToken(token).catch(() => false);
  if (!valid) {
    errEl.textContent = "Token je neplatný nebo nemá oprávnění repo. Zkus znovu.";
    errEl.style.display = "block";
    btn.disabled = false;
    btn.textContent = "Přihlásit se";
    return;
  }

  localStorage.setItem(TOKEN_KEY, token);
  showApp();
}

function doLogout() {
  localStorage.removeItem(TOKEN_KEY);
  location.reload();
}

// ─────────────────────────────────────────────
//  App init
// ─────────────────────────────────────────────
function showApp() {
  $("#login-screen").style.display = "none";
  $("#app").style.display = "block";
  loadImages();
  loadPromoSection();
}

window.addEventListener("DOMContentLoaded", () => {
  if (getToken()) {
    showApp();
  }

  $("#login-btn").addEventListener("click", doLogin);
  $("#pat-input").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
  $("#logout-btn").addEventListener("click", doLogout);
});

// ─────────────────────────────────────────────
//  Load images from GitHub API
// ─────────────────────────────────────────────
async function loadImages() {
  setStatus("Načítám seznam obrázků…");
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${ASSETS_PATH}?ref=${REPO_BRANCH}`;

  const res = await fetch(url, { headers: apiHeaders(getToken()) }).catch(() => null);
  if (!res || !res.ok) {
    setStatus("Chyba při načítání. Zkontroluj připojení nebo oprávnění tokenu.");
    return;
  }

  const items = await res.json();
  // Vyfiltruj promo.jpg — ten se spravuje přes promo sekci
  const jpgs  = items.filter((f) => /\.(jpg|jpeg)$/i.test(f.name) && f.name !== "promo.jpg");

  // Sort: playlist files first (in schedule order), inactive files last alphabetically
  jpgs.sort((a, b) => {
    const ai = PLAYLIST_ORDER.indexOf(a.name);
    const bi = PLAYLIST_ORDER.indexOf(b.name);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return  1;
    return a.name.localeCompare(b.name, "cs");
  });

  setStatus(`${jpgs.length} obrázků v repozitáři`);
  renderGrid(jpgs);
}

// ─────────────────────────────────────────────
//  Render grid
// ─────────────────────────────────────────────
function renderGrid(files) {
  const grid = $("#grid");
  grid.innerHTML = "";

  files.forEach((file) => {
    const label    = LABELS[file.name] || file.name;
    // download_url is a direct CDN link — fast for thumbnails
    const thumbSrc = file.download_url + "?t=" + Date.now();

    const scheduleText = formatSchedule(file.name);
    const inPlaylist   = scheduleText !== null;
    const scheduleBadge = inPlaylist
      ? `<div class="card-schedule">${scheduleText}</div>`
      : `<div class="card-schedule-none">Není v playlistu</div>`;

    const card = document.createElement("div");
    card.className = inPlaylist ? "card" : "card inactive";
    card.dataset.filename = file.name;
    card.dataset.sha      = file.sha;

    card.innerHTML = `
      <div class="card-thumb">
        <img src="${thumbSrc}" alt="${label}" loading="lazy" />
      </div>
      <div class="card-body">
        <div class="card-label">${label}</div>
        ${scheduleBadge}
        <div class="card-filename">${file.name}</div>
        <div class="progress-wrap"><div class="progress-bar"></div></div>
        <div class="upload-wrap">
          <input type="file" accept=".jpg,.jpeg,image/jpeg" aria-label="Nahrát nový obrázek pro: ${label}" />
          <button class="btn btn-primary" style="width:100%">Nahrát nový JPG</button>
        </div>
      </div>
    `;

    card.querySelector("input[type=file]").addEventListener("change", (e) => handleUpload(e, card));
    grid.appendChild(card);
  });
}

// ─────────────────────────────────────────────
//  Upload via GitHub Contents API
// ─────────────────────────────────────────────
async function handleUpload(event, card) {
  const file = event.target.files[0];
  if (!file) return;

  // Validate MIME and extension
  if (!file.type.match(/^image\/jpe?g$/i) || !/\.(jpg|jpeg)$/i.test(file.name)) {
    toast("Povoleny jsou pouze JPG soubory.", "err");
    event.target.value = "";
    return;
  }

  if (file.size > MAX_BYTES) {
    toast("Soubor je příliš velký (max 5 MB).", "err");
    event.target.value = "";
    return;
  }

  const filename    = card.dataset.filename;
  const currentSha  = card.dataset.sha;
  const progressWrap = card.querySelector(".progress-wrap");
  const progressBar  = card.querySelector(".progress-bar");
  const uploadBtn    = card.querySelector(".btn");

  uploadBtn.disabled = true;
  progressWrap.style.display = "block";
  progressBar.style.width = "20%";

  try {
    // Read file as base64
    const base64 = await fileToBase64(file);
    progressBar.style.width = "50%";

    const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${ASSETS_PATH}/${encodeURIComponent(filename)}`;

    const body = {
      message: `Aktualizace obrázku: ${filename}`,
      content: base64,
      branch:  REPO_BRANCH,
      sha:     currentSha, // required to update existing file
    };

    const res = await fetch(apiUrl, {
      method:  "PUT",
      headers: { ...apiHeaders(getToken()), "Content-Type": "application/json" },
      body:    JSON.stringify(body),
    });

    progressBar.style.width = "100%";

    if (res.ok) {
      const data = await res.json();
      // Update SHA so next upload on same card works without reload
      card.dataset.sha = data.content.sha;

      // Refresh thumbnail
      const img = card.querySelector("img");
      img.src = data.content.download_url + "?t=" + Date.now();

      toast(`✓ ${filename} byl úspěšně nahrán a commitnut.`);
    } else {
      const err = await res.json().catch(() => ({}));
      toast(`Chyba ${res.status}: ${err.message || "Neznámá chyba"}`, "err");
    }
  } catch (e) {
    toast("Síťová chyba při nahrávání.", "err");
  } finally {
    setTimeout(() => {
      progressWrap.style.display = "none";
      progressBar.style.width = "0";
    }, 700);
    uploadBtn.disabled = false;
    event.target.value = "";
  }
}

// ─────────────────────────────────────────────
//  File → base64 (without data URI prefix)
// ─────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ─────────────────────────────────────────────
//  Git Data API — multi-file atomic commit
//  files = [{ path: "relative/path", content: "utf-8 string" }, ...]
//  binaryFiles = [{ path: "...", base64: "..." }, ...]
// ─────────────────────────────────────────────
async function multiFileCommit(textFiles, binaryFiles, message) {
  const token = getToken();
  const headers = { ...apiHeaders(token), "Content-Type": "application/json" };
  const base = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;

  // 1. Aktuální commit SHA
  const refRes = await fetch(`${base}/git/ref/heads/${encodeURIComponent(REPO_BRANCH)}`, { headers });
  if (!refRes.ok) throw new Error("Nepodařilo se načíst ref větve.");
  const commitSha = (await refRes.json()).object.sha;

  // 2. SHA stromu aktuálního commitu
  const commitRes = await fetch(`${base}/git/commits/${commitSha}`, { headers });
  if (!commitRes.ok) throw new Error("Nepodařilo se načíst commit.");
  const treeSha = (await commitRes.json()).tree.sha;

  // 3. Vytvoř bloby — textové soubory (UTF-8 → base64 přes TextEncoder)
  const blobPromises = [
    ...textFiles.map(async (f) => {
      const encoded = btoa(unescape(encodeURIComponent(f.content)));
      const r = await fetch(`${base}/git/blobs`, {
        method: "POST", headers,
        body: JSON.stringify({ content: encoded, encoding: "base64" }),
      });
      if (!r.ok) throw new Error(`Nepodařilo se vytvořit blob pro ${f.path}`);
      return { path: f.path, sha: (await r.json()).sha };
    }),
    ...binaryFiles.map(async (f) => {
      const r = await fetch(`${base}/git/blobs`, {
        method: "POST", headers,
        body: JSON.stringify({ content: f.base64, encoding: "base64" }),
      });
      if (!r.ok) throw new Error(`Nepodařilo se vytvořit blob pro ${f.path}`);
      return { path: f.path, sha: (await r.json()).sha };
    }),
  ];
  const blobs = await Promise.all(blobPromises);

  // 4. Nový strom
  const treeRes = await fetch(`${base}/git/trees`, {
    method: "POST", headers,
    body: JSON.stringify({
      base_tree: treeSha,
      tree: blobs.map((b) => ({ path: b.path, mode: "100644", type: "blob", sha: b.sha })),
    }),
  });
  if (!treeRes.ok) throw new Error("Nepodařilo se vytvořit strom.");
  const newTreeSha = (await treeRes.json()).sha;

  // 5. Nový commit
  const newCommitRes = await fetch(`${base}/git/commits`, {
    method: "POST", headers,
    body: JSON.stringify({ message, tree: newTreeSha, parents: [commitSha] }),
  });
  if (!newCommitRes.ok) throw new Error("Nepodařilo se vytvořit commit.");
  const newCommitSha = (await newCommitRes.json()).sha;

  // 6. Aktualizuj ref
  const updateRes = await fetch(`${base}/git/refs/heads/${encodeURIComponent(REPO_BRANCH)}`, {
    method: "PATCH", headers,
    body: JSON.stringify({ sha: newCommitSha }),
  });
  if (!updateRes.ok) throw new Error("Nepodařilo se aktualizovat ref.");

  return newCommitSha;
}

// ─────────────────────────────────────────────
//  Načti index.html obsah z GitHub API
// ─────────────────────────────────────────────
async function fetchIndexHtml() {
  const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${INDEX_PATH}?ref=${REPO_BRANCH}`;
  const res = await fetch(url, { headers: apiHeaders(getToken()) });
  if (!res.ok) throw new Error("Nepodařilo se načíst index.html");
  const data = await res.json();
  return atob(data.content.replace(/\s/g, ""));
}

function bumpVersion(indexContent) {
  return indexContent.replace(
    /const VERSION = "[^"]*"/,
    `const VERSION = "${generateVersion()}"`
  );
}

// ─────────────────────────────────────────────
//  Promo sekce — načtení
// ─────────────────────────────────────────────
// Stav promo sekce (SHA souborů pro případný update)
let promoState = { configSha: null, promoImgSha: null, promoImgUrl: null };

async function loadPromoSection() {
  const section = $("#promo-section");

  try {
    const base = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    const headers = apiHeaders(getToken());

    // Načti config.json a promo.jpg paralelně
    const [cfgRes, imgRes] = await Promise.all([
      fetch(`${base}/${CONFIG_PATH}?ref=${REPO_BRANCH}`, { headers }),
      fetch(`${base}/${ASSETS_PATH}/promo.jpg?ref=${REPO_BRANCH}`, { headers }),
    ]);

    let cfg = { promoEnabled: true, promoIntervalMinutes: 5, promoDurationSeconds: 10, promoTransition: "none" };
    if (cfgRes.ok) {
      const cfgData = await cfgRes.json();
      promoState.configSha = cfgData.sha;
      cfg = JSON.parse(atob(cfgData.content.replace(/\s/g, "")));
    }

    if (imgRes.ok) {
      const imgData = await imgRes.json();
      promoState.promoImgSha = imgData.sha;
      promoState.promoImgUrl = imgData.download_url;
    }

    renderPromoSection(cfg);
  } catch (e) {
    section.innerHTML = `<p style="font-size:.83rem;color:#f47070;">Chyba při načítání promo nastavení.</p>`;
  }
}

// ─────────────────────────────────────────────
//  Promo sekce — render
// ─────────────────────────────────────────────
function renderPromoSection(cfg) {
  const section = $("#promo-section");

  const thumbHtml = promoState.promoImgUrl
    ? `<img src="${promoState.promoImgUrl}?t=${Date.now()}" alt="Promo obrázek" loading="lazy" />`
    : `<div class="promo-no-img">Žádný obrázek</div>`;

  section.innerHTML = `
    <div class="promo-panel">
      <div class="promo-col">
        <div class="promo-col-label">Nastavení</div>

        <div class="toggle-row">
          <span>Zapnout promo overlay</span>
          <label class="toggle">
            <input type="checkbox" id="promo-enabled" ${cfg.promoEnabled ? "checked" : ""} />
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>

        <div class="form-row">
          <label for="promo-interval">Interval zobrazení (minuty)</label>
          <input type="number" id="promo-interval" min="1" max="999" value="${cfg.promoIntervalMinutes ?? 5}" />
        </div>

        <div class="form-row">
          <label for="promo-duration">Doba zobrazení (sekundy)</label>
          <input type="number" id="promo-duration" min="1" max="300" value="${cfg.promoDurationSeconds ?? 10}" />
        </div>

        <div class="form-row">
          <label for="promo-transition">Typ přechodu</label>
          <select id="promo-transition">
            <option value="none"  ${(cfg.promoTransition ?? "none") === "none"  ? "selected" : ""}>Ostrý (bez přechodu)</option>
            <option value="fade"  ${(cfg.promoTransition ?? "none") === "fade"  ? "selected" : ""}>Plynulé prolnutí</option>
          </select>
        </div>

        <button class="btn btn-primary" id="promo-save-btn">Uložit nastavení</button>
        <div class="progress-wrap" id="promo-save-progress"><div class="progress-bar"></div></div>
      </div>

      <div class="promo-col">
        <div class="promo-col-label">Promo obrázek (promo.jpg)</div>
        <div class="promo-thumb-wrap">${thumbHtml}</div>
        <div class="progress-wrap" id="promo-upload-progress"><div class="progress-bar"></div></div>
        <div class="upload-wrap">
          <input type="file" id="promo-file-input" accept=".jpg,.jpeg,image/jpeg" aria-label="Nahrát promo obrázek" />
          <button class="btn btn-primary btn-full">Nahrát nový promo JPG</button>
        </div>
      </div>
    </div>
  `;

  $("#promo-save-btn").addEventListener("click", savePromoConfig);
  $("#promo-file-input").addEventListener("change", handlePromoUpload);
}

// ─────────────────────────────────────────────
//  Promo — uložení nastavení (config.json + VERSION bump)
// ─────────────────────────────────────────────
async function savePromoConfig() {
  const saveBtn      = $("#promo-save-btn");
  const progressWrap = $("#promo-save-progress");
  const progressBar  = progressWrap.querySelector(".progress-bar");

  const newCfg = {
    promoEnabled:           $("#promo-enabled").checked,
    promoIntervalMinutes:   Number($("#promo-interval").value),
    promoDurationSeconds:   Number($("#promo-duration").value),
    promoTransition:        $("#promo-transition").value,
  };

  saveBtn.disabled = true;
  progressWrap.style.display = "block";
  progressBar.style.width = "20%";

  try {
    const indexContent = await fetchIndexHtml();
    progressBar.style.width = "50%";

    const newVersion = generateVersion();
    const updatedIndex = bumpVersion(indexContent);
    const updatedConfig = JSON.stringify(newCfg, null, 2) + "\n";

    progressBar.style.width = "70%";

    await multiFileCommit(
      [
        { path: CONFIG_PATH, content: updatedConfig },
        { path: INDEX_PATH,  content: updatedIndex  },
      ],
      [],
      `Promo nastavení: interval ${newCfg.promoIntervalMinutes} min, zobrazení ${newCfg.promoDurationSeconds} s, verze ${newVersion}`
    );

    progressBar.style.width = "100%";
    // Aktualizuj SHA configu (pro případný další save bez reloadu)
    const cfgRes = await fetch(
      `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${CONFIG_PATH}?ref=${REPO_BRANCH}`,
      { headers: apiHeaders(getToken()) }
    );
    if (cfgRes.ok) promoState.configSha = (await cfgRes.json()).sha;

    toast("✓ Nastavení uloženo a VERSION aktualizována.");
  } catch (e) {
    toast(`Chyba: ${e.message}`, "err");
  } finally {
    setTimeout(() => {
      progressWrap.style.display = "none";
      progressBar.style.width = "0";
    }, 700);
    saveBtn.disabled = false;
  }
}

// ─────────────────────────────────────────────
//  Promo — nahrání promo.jpg (binárně) + VERSION bump
// ─────────────────────────────────────────────
async function handlePromoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  if (!file.type.match(/^image\/jpe?g$/i) || !/\.(jpg|jpeg)$/i.test(file.name)) {
    toast("Povoleny jsou pouze JPG soubory.", "err");
    event.target.value = "";
    return;
  }

  if (file.size > MAX_BYTES) {
    toast("Soubor je příliš velký (max 5 MB).", "err");
    event.target.value = "";
    return;
  }

  const progressWrap = $("#promo-upload-progress");
  const progressBar  = progressWrap.querySelector(".progress-bar");
  const uploadBtn    = event.target.closest(".upload-wrap").querySelector(".btn");

  uploadBtn.disabled = true;
  progressWrap.style.display = "block";
  progressBar.style.width = "20%";

  try {
    const base64 = await fileToBase64(file);
    progressBar.style.width = "40%";

    const indexContent = await fetchIndexHtml();
    progressBar.style.width = "60%";

    const newVersion   = generateVersion();
    const updatedIndex = bumpVersion(indexContent);

    await multiFileCommit(
      [{ path: INDEX_PATH, content: updatedIndex }],
      [{ path: `${ASSETS_PATH}/promo.jpg`, base64 }],
      `Nahrán nový promo obrázek, verze ${newVersion}`
    );

    progressBar.style.width = "100%";

    // Obnov SHA promo.jpg a náhled
    const imgRes = await fetch(
      `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${ASSETS_PATH}/promo.jpg?ref=${REPO_BRANCH}`,
      { headers: apiHeaders(getToken()) }
    );
    if (imgRes.ok) {
      const imgData = await imgRes.json();
      promoState.promoImgSha = imgData.sha;
      promoState.promoImgUrl = imgData.download_url;
      const thumbImg = $(".promo-thumb-wrap img");
      if (thumbImg) thumbImg.src = imgData.download_url + "?t=" + Date.now();
    }

    toast("✓ promo.jpg nahrán a VERSION aktualizována.");
  } catch (e) {
    toast(`Chyba: ${e.message}`, "err");
  } finally {
    setTimeout(() => {
      progressWrap.style.display = "none";
      progressBar.style.width = "0";
    }, 700);
    uploadBtn.disabled = false;
    event.target.value = "";
  }
}
