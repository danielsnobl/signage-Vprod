<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu Display</title>

  <!-- Pom脜炉脜戮e proti n脛聸kter脙陆m cache probl脙漏m脜炉m v prohl脙颅脜戮e脛聧脙颅ch -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    html, body { height: 100%; margin: 0; background: #000; }
    .wrap { height: 100%; display: grid; place-items: center; }
    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain; /* zm脛聸脜聢 na cover, pokud chce脜隆 o脜聶ez p脜聶es celou TV */
      background: #000;
    }
    /* jemn脙陆 fade p脜聶i p脜聶epnut脙颅 */
    .fade { transition: opacity 350ms ease; opacity: 1; }
    .fade.out { opacity: 0; }

    /* 芒聰聙芒聰聙 Promo overlay 芒聰聙芒聰聙 */
    #promo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }
    #promo.promo-fade     { transition: opacity 350ms ease; }
    #promo.promo-visible  { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="screen" class="fade" alt="Menu" />
  </div>
  <img id="promo" alt="Promo" />

<script>
(() => {
  // ======== D脜庐LE脜陆IT脙聣: zm脛聸脜聢 1脙聴 t脙陆dn脛聸 (kv脜炉li cache na TV) ========
  // Nap脜聶. "2026w07", "2026-02-16", cokoliv
  const VERSION = "2026w04101938";

  // ======== Nastaven脙颅 rotace v r脙隆mci bloku (kdy脜戮 m脙隆脜隆 v脙颅c JPG) ========
  const ROTATE_EVERY_MS = 15000; // 15s

  // ======== Auto-refresh str脙隆nky (TV prohl脙颅脜戮e脛聧e se ob脛聧as unav脙颅) ========
  const HARD_REFRESH_EVERY_MS = 4 * 60 * 60 * 1000; // 4 hodiny

  // ======== Cesta k obr脙隆zk脜炉m ========
  const ASSET_BASE = "./assets/";

  // Pomocn脙隆 funkce: vytvo脜聶脙颅 URL s cache-bust parametrem
  function imgUrl(filename) {
    const sep = filename.includes("?") ? "&" : "?";
    return ASSET_BASE + filename + sep + "v=" + encodeURIComponent(VERSION);
  }

  // ======== Tvoje playlisty (dopl脜聢 soubory) ========
  // Do ka脜戮d脙漏ho bloku m脜炉脜戮e脜隆 d脙隆t 1 nebo v脙颅ce JPG (budou se st脜聶脙颅dat).
  const PLAYLISTS = {
    // PO芒聙聯P脙聛
    wk_preopen:   ["vypln_pred_otevrenim.jpg"],                 // 8芒聙聯9
    wk_breakfast: ["snidane.jpg"],                               // 9芒聙聯11
    wk_between1:  ["vypln_mezi_snidani_a_obedem.jpg"],           // 11芒聙聯11:30
    wk_lunch:     ["obed_tydne.jpg"],                            // 11:30芒聙聯15 (t脙陆dn脛聸 m脛聸n脙颅脜隆)
    wk_between2:  ["vypln_mezi_obedem_a_veceri.jpg"],            // 15芒聙聯16
    wk_dinner:    ["vecere.jpg"],                                // 16芒聙聯21
    wk_drinks:    ["napoje_a_oteviraci_doba_kuchyne.jpg"],       // 21芒聙聯22
    wk_postclose: ["vypln_po_zavreni.jpg"],                      // 22芒聙聯23

    // SO芒聙聯NE
    we_preopen:   ["vypln_pred_otevrenim.jpg"],                 // 8芒聙聯9
    we_breakfast: ["snidane_vikend.jpg"],                        // 9芒聙聯15
    we_between:   ["vypln_mezi_obedem_a_veceri.jpg"],            // 15芒聙聯16
    we_dinner:    ["vecere.jpg"],                                // 16芒聙聯21
    we_drinks:    ["napoje_a_oteviraci_doba_kuchyne.jpg"],       // 21芒聙聯22
    we_postclose: ["vypln_po_zavreni.jpg"],                      // 22芒聙聯23
  };

  // ======== Schedule definice ========
  // 脛聦asy jsou v lok脙隆ln脙颅m 脛聧ase TV (doporu脛聧eno m脙颅t TV na Europe/Prague).
  // day: 0=Ne,1=Po,...6=So
  const SCHEDULE = {
    weekday: [
      { start: "08:00", end: "09:00", key: "wk_preopen"   },
      { start: "09:00", end: "11:00", key: "wk_breakfast" },
      { start: "11:00", end: "11:30", key: "wk_between1"  },
      { start: "11:30", end: "15:00", key: "wk_lunch"     },
      { start: "15:00", end: "16:00", key: "wk_between2"  },
      { start: "16:00", end: "21:00", key: "wk_dinner"    },
      { start: "21:00", end: "22:00", key: "wk_drinks"    },
      { start: "22:00", end: "23:00", key: "wk_postclose" },
    ],
    weekend: [
      { start: "08:00", end: "09:00", key: "we_preopen"   },
      { start: "09:00", end: "15:00", key: "we_breakfast" },
      { start: "15:00", end: "16:00", key: "we_between"   },
      { start: "16:00", end: "21:00", key: "we_dinner"    },
      { start: "21:00", end: "22:00", key: "we_drinks"    },
      { start: "22:00", end: "23:00", key: "we_postclose" },
    ]
  };

  // Pokud je mimo 08:00芒聙聯23:00, co zobrazit:
  const OUT_OF_HOURS_KEY = "wk_postclose"; // m脜炉脜戮e脜隆 d脙隆t vlastn脙颅 "noc.jpg"

  // ======== Implementace ========
  const imgEl = document.getElementById("screen");
  let currentKey = null;
  let rotateTimer = null;
  let indexInPlaylist = 0;

  function parseTimeToMinutes(hhmm) {
    const [h, m] = hhmm.split(":").map(Number);
    return h * 60 + m;
  }

  function nowMinutes(d) {
    return d.getHours() * 60 + d.getMinutes();
  }

  function isWeekend(day) {
    // So(6), Ne(0)
    return day === 0 || day === 6;
  }

  function pickScheduleKey(d) {
    const minutes = nowMinutes(d);
    const day = d.getDay();

    const table = isWeekend(day) ? SCHEDULE.weekend : SCHEDULE.weekday;

    for (const slot of table) {
      const s = parseTimeToMinutes(slot.start);
      const e = parseTimeToMinutes(slot.end);
      if (minutes >= s && minutes < e) return slot.key;
    }
    return OUT_OF_HOURS_KEY;
  }

  function setImage(filename) {
    imgEl.classList.add("out");
    const url = imgUrl(filename);
    const pre = new Image();
    pre.onload = () => {
      imgEl.src = url;
      requestAnimationFrame(() => imgEl.classList.remove("out"));
    };
    pre.onerror = () => {
      // fallback: nic nezobrazuj, nebo sem dej default
      console.warn("Image failed to load:", url);
      requestAnimationFrame(() => imgEl.classList.remove("out"));
    };
    pre.src = url;
  }

  function startRotationFor(key) {
    const list = PLAYLISTS[key] || [];
    if (!list.length) {
      console.warn("Empty playlist for key:", key);
      return;
    }

    // zresetuj rotaci
    indexInPlaylist = 0;
    setImage(list[indexInPlaylist]);

    if (rotateTimer) clearInterval(rotateTimer);
    if (list.length > 1) {
      rotateTimer = setInterval(() => {
        indexInPlaylist = (indexInPlaylist + 1) % list.length;
        setImage(list[indexInPlaylist]);
      }, ROTATE_EVERY_MS);
    } else {
      rotateTimer = null;
    }
  }

  function tick() {
    const d = new Date();
    const key = pickScheduleKey(d);
    if (key !== currentKey) {
      currentKey = key;
      startRotationFor(currentKey);
    }
  }

  // Start
  tick();
  setInterval(tick, 15 * 1000); // p脜聶epo脛聧et schedule ka脜戮d脙陆ch 15s
  setTimeout(() => location.reload(), HARD_REFRESH_EVERY_MS); // hard refresh

  // ======== Promo overlay ========
  const promoEl = document.getElementById("promo");
  let promoReady = false;

  async function initPromo() {
    // Na脛聧ti config 芒聙聰 pokud sel脜戮e nebo neexistuje, pou脜戮ij v脙陆choz脙颅 hodnoty
    let cfg = {};
    try {
      const res = await fetch("./config.json?v=" + encodeURIComponent(VERSION));
      if (res.ok) cfg = await res.json();
    } catch (_) { /* ti脜隆e pokra脛聧uj s v脙陆choz脙颅mi hodnotami */ }

    const enabled      = cfg.promoEnabled !== false;
    const intervalMs   = ((cfg.promoIntervalMinutes ?? 5)) * 60 * 1000;
    const durationMs   = ((cfg.promoDurationSeconds ?? 10)) * 1000;
    const useFade      = cfg.promoTransition === "fade";

    if (!enabled) return;

    // Preload promo.jpg 芒聙聰 pokud neexistuje, ti脜隆e p脜聶esko脛聧脙颅me
    const src = imgUrl("promo.jpg");
    const pre = new Image();
    pre.onload = () => {
      promoEl.src = src;
      if (useFade) promoEl.classList.add("promo-fade");
      promoReady = true;
      // Prvn脙颅 zobrazen脙颅 a脜戮 po prvn脙颅m cel脙漏m intervalu
      setInterval(() => showPromo(durationMs), intervalMs);
    };
    pre.onerror = () => {
      // promo.jpg neexistuje 芒聙聰 nic se nestane
    };
    pre.src = src;
  }

  function showPromo(durationMs) {
    if (!promoReady) return;
    promoEl.classList.add("promo-visible");
    setTimeout(() => promoEl.classList.remove("promo-visible"), durationMs);
  }

  initPromo();

})();
</script>
</body>
</html>
