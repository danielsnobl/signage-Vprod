<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Menu Display</title>

  <!-- Pom脙聟脗炉脙聟脗戮e proti n脙聞脗聸kter脙聝脗陆m cache probl脙聝脗漏m脙聟脗炉m v prohl脙聝脗颅脙聟脗戮e脙聞脗聧脙聝脗颅ch -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    html, body { height: 100%; margin: 0; background: #000; }
    .wrap { height: 100%; display: grid; place-items: center; }
    img {
      width: 100vw;
      height: 100vh;
      object-fit: contain; /* zm脙聞脗聸脙聟脗聢 na cover, pokud chce脙聟脗隆 o脙聟脗聶ez p脙聟脗聶es celou TV */
      background: #000;
    }
    /* jemn脙聝脗陆 fade p脙聟脗聶i p脙聟脗聶epnut脙聝脗颅 */
    .fade { transition: opacity 350ms ease; opacity: 1; }
    .fade.out { opacity: 0; }

    /* 脙垄脗聰脗聙脙垄脗聰脗聙 Promo overlay 脙垄脗聰脗聙脙垄脗聰脗聙 */
    #promo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #000;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
    }
    #promo.promo-fade     { transition: opacity 350ms ease; }
    #promo.promo-visible  { opacity: 1; }
  </style>
</head>
<body>
  <div class="wrap">
    <img id="screen" class="fade" alt="Menu" />
  </div>
  <img id="promo" alt="Promo" />

<script>
(() => {
  // ======== D脙聟脗庐LE脙聟脗陆IT脙聝脗聣: zm脙聞脗聸脙聟脗聢 1脙聝脗聴 t脙聝脗陆dn脙聞脗聸 (kv脙聟脗炉li cache na TV) ========
  // Nap脙聟脗聶. "2026w07", "2026-02-16", cokoliv
  const VERSION = "2026w04101943";

  // ======== Nastaven脙聝脗颅 rotace v r脙聝脗隆mci bloku (kdy脙聟脗戮 m脙聝脗隆脙聟脗隆 v脙聝脗颅c JPG) ========
  const ROTATE_EVERY_MS = 15000; // 15s

  // ======== Auto-refresh str脙聝脗隆nky (TV prohl脙聝脗颅脙聟脗戮e脙聞脗聧e se ob脙聞脗聧as unav脙聝脗颅) ========
  const HARD_REFRESH_EVERY_MS = 4 * 60 * 60 * 1000; // 4 hodiny

  // ======== Cesta k obr脙聝脗隆zk脙聟脗炉m ========
  const ASSET_BASE = "./assets/";

  // Pomocn脙聝脗隆 funkce: vytvo脙聟脗聶脙聝脗颅 URL s cache-bust parametrem
  function imgUrl(filename) {
    const sep = filename.includes("?") ? "&" : "?";
    return ASSET_BASE + filename + sep + "v=" + encodeURIComponent(VERSION);
  }

  // ======== Tvoje playlisty (dopl脙聟脗聢 soubory) ========
  // Do ka脙聟脗戮d脙聝脗漏ho bloku m脙聟脗炉脙聟脗戮e脙聟脗隆 d脙聝脗隆t 1 nebo v脙聝脗颅ce JPG (budou se st脙聟脗聶脙聝脗颅dat).
  const PLAYLISTS = {
    // PO脙垄脗聙脗聯P脙聝脗聛
    wk_preopen:   ["vypln_pred_otevrenim.jpg"],                 // 8脙垄脗聙脗聯9
    wk_breakfast: ["snidane.jpg"],                               // 9脙垄脗聙脗聯11
    wk_between1:  ["vypln_mezi_snidani_a_obedem.jpg"],           // 11脙垄脗聙脗聯11:30
    wk_lunch:     ["obed_tydne.jpg"],                            // 11:30脙垄脗聙脗聯15 (t脙聝脗陆dn脙聞脗聸 m脙聞脗聸n脙聝脗颅脙聟脗隆)
    wk_between2:  ["vypln_mezi_obedem_a_veceri.jpg"],            // 15脙垄脗聙脗聯16
    wk_dinner:    ["vecere.jpg"],                                // 16脙垄脗聙脗聯21
    wk_drinks:    ["napoje_a_oteviraci_doba_kuchyne.jpg"],       // 21脙垄脗聙脗聯22
    wk_postclose: ["vypln_po_zavreni.jpg"],                      // 22脙垄脗聙脗聯23

    // SO脙垄脗聙脗聯NE
    we_preopen:   ["vypln_pred_otevrenim.jpg"],                 // 8脙垄脗聙脗聯9
    we_breakfast: ["snidane_vikend.jpg"],                        // 9脙垄脗聙脗聯15
    we_between:   ["vypln_mezi_obedem_a_veceri.jpg"],            // 15脙垄脗聙脗聯16
    we_dinner:    ["vecere.jpg"],                                // 16脙垄脗聙脗聯21
    we_drinks:    ["napoje_a_oteviraci_doba_kuchyne.jpg"],       // 21脙垄脗聙脗聯22
    we_postclose: ["vypln_po_zavreni.jpg"],                      // 22脙垄脗聙脗聯23
  };

  // ======== Schedule definice ========
  // 脙聞脗聦asy jsou v lok脙聝脗隆ln脙聝脗颅m 脙聞脗聧ase TV (doporu脙聞脗聧eno m脙聝脗颅t TV na Europe/Prague).
  // day: 0=Ne,1=Po,...6=So
  const SCHEDULE = {
    weekday: [
      { start: "08:00", end: "09:00", key: "wk_preopen"   },
      { start: "09:00", end: "11:00", key: "wk_breakfast" },
      { start: "11:00", end: "11:30", key: "wk_between1"  },
      { start: "11:30", end: "15:00", key: "wk_lunch"     },
      { start: "15:00", end: "16:00", key: "wk_between2"  },
      { start: "16:00", end: "21:00", key: "wk_dinner"    },
      { start: "21:00", end: "22:00", key: "wk_drinks"    },
      { start: "22:00", end: "23:00", key: "wk_postclose" },
    ],
    weekend: [
      { start: "08:00", end: "09:00", key: "we_preopen"   },
      { start: "09:00", end: "15:00", key: "we_breakfast" },
      { start: "15:00", end: "16:00", key: "we_between"   },
      { start: "16:00", end: "21:00", key: "we_dinner"    },
      { start: "21:00", end: "22:00", key: "we_drinks"    },
      { start: "22:00", end: "23:00", key: "we_postclose" },
    ]
  };

  // Pokud je mimo 08:00脙垄脗聙脗聯23:00, co zobrazit:
  const OUT_OF_HOURS_KEY = "wk_postclose"; // m脙聟脗炉脙聟脗戮e脙聟脗隆 d脙聝脗隆t vlastn脙聝脗颅 "noc.jpg"

  // ======== Implementace ========
  const imgEl = document.getElementById("screen");
  let currentKey = null;
  let rotateTimer = null;
  let indexInPlaylist = 0;

  function parseTimeToMinutes(hhmm) {
    const [h, m] = hhmm.split(":").map(Number);
    return h * 60 + m;
  }

  function nowMinutes(d) {
    return d.getHours() * 60 + d.getMinutes();
  }

  function isWeekend(day) {
    // So(6), Ne(0)
    return day === 0 || day === 6;
  }

  function pickScheduleKey(d) {
    const minutes = nowMinutes(d);
    const day = d.getDay();

    const table = isWeekend(day) ? SCHEDULE.weekend : SCHEDULE.weekday;

    for (const slot of table) {
      const s = parseTimeToMinutes(slot.start);
      const e = parseTimeToMinutes(slot.end);
      if (minutes >= s && minutes < e) return slot.key;
    }
    return OUT_OF_HOURS_KEY;
  }

  function setImage(filename) {
    imgEl.classList.add("out");
    const url = imgUrl(filename);
    const pre = new Image();
    pre.onload = () => {
      imgEl.src = url;
      requestAnimationFrame(() => imgEl.classList.remove("out"));
    };
    pre.onerror = () => {
      // fallback: nic nezobrazuj, nebo sem dej default
      console.warn("Image failed to load:", url);
      requestAnimationFrame(() => imgEl.classList.remove("out"));
    };
    pre.src = url;
  }

  function startRotationFor(key) {
    const list = PLAYLISTS[key] || [];
    if (!list.length) {
      console.warn("Empty playlist for key:", key);
      return;
    }

    // zresetuj rotaci
    indexInPlaylist = 0;
    setImage(list[indexInPlaylist]);

    if (rotateTimer) clearInterval(rotateTimer);
    if (list.length > 1) {
      rotateTimer = setInterval(() => {
        indexInPlaylist = (indexInPlaylist + 1) % list.length;
        setImage(list[indexInPlaylist]);
      }, ROTATE_EVERY_MS);
    } else {
      rotateTimer = null;
    }
  }

  function tick() {
    const d = new Date();
    const key = pickScheduleKey(d);
    if (key !== currentKey) {
      currentKey = key;
      startRotationFor(currentKey);
    }
  }

  // Start
  tick();
  setInterval(tick, 15 * 1000); // p脙聟脗聶epo脙聞脗聧et schedule ka脙聟脗戮d脙聝脗陆ch 15s
  setTimeout(() => location.reload(), HARD_REFRESH_EVERY_MS); // hard refresh

  // ======== Promo overlay ========
  const promoEl = document.getElementById("promo");
  let promoReady = false;

  async function initPromo() {
    // Na脙聞脗聧ti config 脙垄脗聙脗聰 pokud sel脙聟脗戮e nebo neexistuje, pou脙聟脗戮ij v脙聝脗陆choz脙聝脗颅 hodnoty
    let cfg = {};
    try {
      const res = await fetch("./config.json?v=" + encodeURIComponent(VERSION));
      if (res.ok) cfg = await res.json();
    } catch (_) { /* ti脙聟脗隆e pokra脙聞脗聧uj s v脙聝脗陆choz脙聝脗颅mi hodnotami */ }

    const enabled      = cfg.promoEnabled !== false;
    const intervalMs   = ((cfg.promoIntervalMinutes ?? 5)) * 60 * 1000;
    const durationMs   = ((cfg.promoDurationSeconds ?? 10)) * 1000;
    const useFade      = cfg.promoTransition === "fade";

    if (!enabled) return;

    // Preload promo.jpg 脙垄脗聙脗聰 pokud neexistuje, ti脙聟脗隆e p脙聟脗聶esko脙聞脗聧脙聝脗颅me
    const src = imgUrl("promo.jpg");
    const pre = new Image();
    pre.onload = () => {
      promoEl.src = src;
      if (useFade) promoEl.classList.add("promo-fade");
      promoReady = true;
      // Prvn脙聝脗颅 zobrazen脙聝脗颅 a脙聟脗戮 po prvn脙聝脗颅m cel脙聝脗漏m intervalu
      setInterval(() => showPromo(durationMs), intervalMs);
    };
    pre.onerror = () => {
      // promo.jpg neexistuje 脙垄脗聙脗聰 nic se nestane
    };
    pre.src = src;
  }

  function showPromo(durationMs) {
    if (!promoReady) return;
    promoEl.classList.add("promo-visible");
    setTimeout(() => promoEl.classList.remove("promo-visible"), durationMs);
  }

  initPromo();

})();
</script>
</body>
</html>
